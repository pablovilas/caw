  <text x="868" y="550" fill="#EAE6DD" font-family="'IBM Plex Sans', sans-serif" font-size="48" font-weight="500">from one quiet perch.</text>

  <!-- Status badges -->
  <circle cx="888" cy="630" r="8" fill="#1D9E75"/>
  <text x="906" y="636" fill="#A7AAA4" font-family="'IBM Plex Mono', monospace" font-size="18">working</text>

  <polygon points="1038,622 1046,638 1030,638" fill="#EF9F27"/>
