  <text x="860" y="340" fill="#EAE6DD" font-family="'Space Grotesk', 'Avenir Next', sans-serif" font-size="160" font-weight="700" letter-spacing="-8">caw</text>
  <text x="868" y="400" fill="#A7AAA4" font-family="'IBM Plex Mono', monospace" font-size="28" font-weight="500" letter-spacing="2">coding assistant watcher</text>

