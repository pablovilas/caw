  <circle cx="1188" cy="630" r="8" fill="none" stroke="#888780" stroke-width="3"/>
  <circle cx="1188" cy="630" r="3" fill="#888780"/>
  <text x="1206" y="636" fill="#A7AAA4" font-family="'IBM Plex Mono', monospace" font-size="18">idle</text>

