    <line x1="40" y1="400" x2="1560" y2="400" stroke="#EAE6DD" stroke-width="1"/>
    <line x1="40" y1="520" x2="1560" y2="520" stroke="#EAE6DD" stroke-width="1"/>
    <line x1="40" y1="640" x2="1560" y2="640" stroke="#EAE6DD" stroke-width="1"/>
    <line x1="40" y1="760" x2="1560" y2="760" stroke="#EAE6DD" stroke-width="1"/>
  </g>

  <!-- Crow mark (left side) -->
