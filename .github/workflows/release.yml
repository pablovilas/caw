name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p caw

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Determine target triple
        id: target
        run: echo "triple=$(rustc -vV | grep host | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Package binary
        run: |
          cd target/release
          tar czf "caw-${{ steps.version.outputs.version }}-${{ steps.target.outputs.triple }}.tar.gz" caw

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/caw-*.tar.gz
