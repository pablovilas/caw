name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build .app bundle and upload as release asset
      - name: Bundle macOS .app
        run: |
          # Find the binary GoReleaser built
          BINARY=$(find dist -name "caw" -type f -perm +111 | head -1)
          if [ -z "$BINARY" ]; then
            echo "Could not find caw binary in dist/"
            ls -R dist/
            exit 1
          fi
          echo "Found binary: $BINARY"

          APP="caw.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BINARY" "$APP/Contents/MacOS/"
          cp crates/caw/icons/caw.icns "$APP/Contents/Resources/"
          cp crates/caw/macos/Info.plist "$APP/Contents/"

          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/0.0.0/$VERSION/g" "$APP/Contents/Info.plist"

          zip -r "caw_${VERSION}_macos_arm64.app.zip" "$APP"

      - name: Upload .app to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" "caw_${VERSION}_macos_arm64.app.zip"

      # Update Homebrew cask in tap
      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="caw_${VERSION}_macos_arm64.app.zip"
          SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/pablovilas/homebrew-tap.git tap
          mkdir -p tap/Casks

          cat > tap/Casks/caw.rb <<CASK
          cask "caw" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/pablovilas/caw/releases/download/v#{version}/caw_#{version}_macos_arm64.app.zip"
            name "caw"
            desc "Monitor your AI coding assistants"
            homepage "https://github.com/pablovilas/caw"

            app "caw.app"
            binary "#{appdir}/caw.app/Contents/MacOS/caw"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/caw.app"],
                             sudo: false
            end

            zap trash: [
              "~/Library/Preferences/com.pablovilas.caw.plist",
            ]
          end
          CASK

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/caw.rb
          git commit -m "chore: update caw cask to ${VERSION}" || true
          git push
