version: 2

builds:
  - id: caw
    builder: rust
    binary: caw
    dir: .
    tool: cargo
    command: build
    flags:
      - --release
      - -p=caw
    targets:
      - aarch64-apple-darwin

archives:
  - id: caw
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

