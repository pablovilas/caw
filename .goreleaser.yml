version: 2

builds:
  - id: caw
    builder: rust
    binary: caw
    dir: .
    tool: cargo
    command: build
    flags:
      - --release
      - -p=caw
    targets:
      - aarch64-apple-darwin

# Assemble .app bundle after build, before archiving
after:
  hooks:
    - cmd: >
        sh -c '
        for BIN in dist/caw_*/caw; do
          DIR=$(dirname "$BIN");
          APP="$DIR/caw.app";
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources";
          cp "$BIN" "$APP/Contents/MacOS/caw";
          cp crates/caw/icons/caw.icns "$APP/Contents/Resources/";
          cp crates/caw/macos/Info.plist "$APP/Contents/";
        done
        '

archives:
  - id: caw
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: "dist/caw_aarch64-apple-darwin/caw.app/**/*"
        dst: "caw.app"
        strip_parent: true

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: caw
    repository:
      owner: pablovilas
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/pablovilas/caw"
    description: "Monitor your AI coding assistants"
    license: "MIT"
    install: |
      prefix.install "caw.app"
      bin.write_exec_script prefix/"caw.app/Contents/MacOS/caw"
    test: |
      system "#{bin}/caw", "--help"
